api:
  questions:
    store:
      path: questions
      controller: Project\UI\Http\Controllers\QuestionController
      action: create
      methods: POST
    index:
      path: questions
      controller: Project\UI\Http\Controllers\QuestionController
      action: index
      methods:
        - GET
        - HEAD
commands:
  cache_clear:
    name: cache:clear
    class: Project\UI\Cli\ClearCacheCommand
  create_question:
    name: question:create
    class: Project\UI\Cli\CreateQuestionCommand