deptrac:
  analyser:
    types:
      - "use"
  paths:
    - ./project
    - ./core

  exclude_files: ~

  layers:
    - name: Domain
      collectors:
        - type: directory
          value: ./project/\w+/Domain/*.*
    - name: Application
      collectors:
        - type: directory
          value: ./project/\w+/Application/*.*
    - name: Api
      collectors:
        - type: directory
          value: ./project/\w+/Api/.*
    - name: Infrastructure
      collectors:
        - type: bool
          must:
            - type: directory
              value: ./project/\w+/Infrastructure/*.*
    - name: Core
      collectors:
        - type: directory
          value: ./core/.*
    - name: Endpoint
      collectors:
        - type: directory
          value: ./project/Endpoint/*.*
  ruleset:
    Domain: [ ]
    Application:
      - Application
      - Domain
    Api:
      - Application
    Infrastructure:
      - Domain
      - Application
      - Core
    Endpoint:
      - Core
      - Api
    Core: ~
