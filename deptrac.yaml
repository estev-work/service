deptrac:
  paths:
    - ./project
    - ./core
  exclude_files: ~
  layers:
    - name: Domain
      collectors:
        - type: directory
          pattern: 'project/**/(Base|Modules/*)/Domain/**'
    - name: Application
      collectors:
        - type: directory
          pattern: 'project/**/(Base|Modules/*)/Application/**'
    - name: Api
      collectors:
        - type: directory
          pattern: 'project/**/Modules/*/Api/**'
    - name: Infrastructure
      collectors:
        - type: directory
          pattern: 'project/**/(Base|Modules/*)/Infrastructure/**'
    - name: Core
      collectors:
        - type: directory
          pattern: 'core/**'

  ruleset:
    Domain: [ ]
    Application:
      - Domain
    Api:
      - Domain
      - Application
    Infrastructure:
      - Domain
      - Application
      - Api
      - Core
